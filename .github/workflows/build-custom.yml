name: Build Custom v2rayNG APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout v2rayNG
        uses: actions/checkout@v4
        with:
          repository: 2dust/v2rayNG
          
      - name: Checkout custom Xray core
        uses: actions/checkout@v4
        with:
          repository: npaw2005/Xray-core-allowinsecure
          path: xray-core
          
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: '34'
          build-tools: '34.0.0'
          ndk-version: '26.1.10909125'
          
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
      - name: Initialize gomobile
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init 
          
      - name: Clone AndroidLibXrayLite
        run: git clone https://github.com/2dust/AndroidLibXrayLite.git
        
      - name: Update go.mod for custom core
        working-directory: AndroidLibXrayLite
        run: |
          go clean -modcache
          go mod edit -replace github.com/xtls/xray-core=github.com/npaw2005/Xray-core-allowinsecure@latest
          cat go.mod
          go mod tidy -v
          
      - name: Build native library with gomobile
        working-directory: AndroidLibXrayLite
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile bind -v -target=android -androidapi 21 -ldflags='-s -w -checklinkname=0' ./
          
      - name: Copy compiled AAR to v2rayNG
        run: |
          cp AndroidLibXrayLite/libv2ray.aar V2rayNG/app/libs/
          ls -la V2rayNG/app/libs/
          
      - name: Build APK
        working-directory: V2rayNG
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-custom-apk
          path: V2rayNG/app/build/outputs/apk/playstore/release/
          retention-days: 30
